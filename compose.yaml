services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: chatterra
      POSTGRES_USER: chatterra
      POSTGRES_PASSWORD: chatterra
    ports:
      - "5432:5432"
    volumes:
      - chatterra-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatterra -d chatterra"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  chatterra-postgres:
